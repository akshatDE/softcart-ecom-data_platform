; SoftCart data platform configuration.
; Every value can be overridden with an environment variable named
; SOFTCART_<SECTION>__<KEY> (upper-cased), e.g. SOFTCART_MYSQL__HOST=mysql.
; docker-compose.yml uses that mechanism so the same file works both on the
; host (localhost + published ports) and inside containers (service names).

[mysql]
host = localhost
port = 3306
user = softcart
password = softcart_change_me
database = softcart_oltp

[mongodb]
host = localhost
port = 27017
user = softcart
password = softcart_change_me
database = softcart_catalog
collection = products

[postgres]
host = localhost
port = 5432
user = softcart
password = softcart_change_me
database = softcart_staging
schema = staging

[duckdb]
database_path = data/analytics/softcart.duckdb

[data_generation]
num_customers = 500
num_products = 200
num_orders = 6000
max_items_per_order = 5
num_promotions = 20
return_rate = 0.08
start_date = 2024-01-01
end_date = 2026-06-30
seed = 42
output_dir = data/generated

[pipeline]
batch_size = 1000
staging_table_prefix = stg_
reporting_cutoff_hour = 8
max_staleness_days = 400

[airflow]
schedule = @daily
retries = 2
retry_delay_minutes = 5
dag_owner = softcart-data-eng

[ollama]
host = localhost
port = 11434
model = qwen3.5
; generous: first request after idle cold-loads the model into memory
request_timeout_seconds = 300
temperature = 0.0

[nlp_sql]
max_result_rows = 500
query_timeout_seconds = 30

[api]
host = 0.0.0.0
port = 8000

[dashboard]
host = 0.0.0.0
port = 8501
api_base_url = http://localhost:8000

[logging]
level = INFO
log_dir = logs
rotation = 10 MB
retention = 14 days
